<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pablo Novak — Epecuén</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:"Raleway",sans-serif;font-weight:300;background:#060c14;color:#f0e8d8;}

/* ═══ FONDO ═══ */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden;}

#sky{
  position:absolute;top:0;left:0;right:0;height:56%;
  background:linear-gradient(to bottom,#2860a0 0%,#5090c0 45%,#88bcd8 100%);
  transition:background 5s ease;
}
#sky.durante{background:linear-gradient(to bottom,#060e1a 0%,#0e1e30 55%,#162840 100%);}
#sky.despues{background:linear-gradient(to bottom,#5a6878 0%,#7a8898 50%,#a0b0bc 100%);}

.nube{position:absolute;background:rgba(255,255,255,0.7);border-radius:40px;}
.nube::before,.nube::after{content:"";position:absolute;background:rgba(255,255,255,0.7);border-radius:50%;}
#n1{width:120px;height:30px;top:14%;left:3%;animation:nm 36s linear infinite;}
#n1::before{width:50px;height:50px;top:-21px;left:14px;}
#n1::after{width:36px;height:36px;top:-13px;right:16px;}
#n2{width:85px;height:24px;top:9%;left:48%;animation:nm 54s linear infinite 9s;}
#n2::before{width:38px;height:38px;top:-16px;left:11px;}
#n2::after{width:30px;height:30px;top:-10px;right:11px;}
#n3{width:95px;height:26px;top:21%;left:70%;animation:nm 46s linear infinite 4s;}
#n3::before{width:42px;height:42px;top:-18px;left:13px;}
@keyframes nm{from{transform:translateX(0);}to{transform:translateX(130vw);}}

#terrain{
  position:absolute;bottom:0;left:0;right:0;height:44%;
  background:linear-gradient(to bottom,#4a8228 0%,#72a040 15%,#c0b068 55%,#a09050 100%);
  transition:background 5s ease;
}
#terrain.durante{background:linear-gradient(to bottom,rgba(12,44,100,0.96) 0%,rgba(6,26,60,1) 100%);}
#terrain.despues{background:linear-gradient(to bottom,#a8a098 0%,#c8c0b0 35%,#e4dcd0 75%,#f0e8dc 100%);}

#lago{
  position:absolute;bottom:42%;left:-2%;width:28%;height:12%;
  background:linear-gradient(to bottom,#4a88b0,#1a4e7e);
  border-radius:50% 50% 0 0/28% 28% 0 0;opacity:0.8;transition:all 5s ease;
}
#lago.durante{width:112%;left:-6%;height:70%;bottom:0;border-radius:0;background:linear-gradient(to bottom,#184878,#08182e);opacity:0.96;}
#lago.despues{width:22%;height:7%;bottom:42%;opacity:0.55;}

#olas{position:absolute;left:0;right:0;bottom:42%;height:7px;overflow:hidden;transition:bottom 5s ease;}
#olas.durante{bottom:69%;}
.o1{width:200%;height:7px;animation:om 4s linear infinite;}
.o2{width:200%;height:7px;animation:om 6s linear infinite reverse;margin-top:-5px;opacity:0.5;}
@keyframes om{from{transform:translateX(0);}to{transform:translateX(-50%);}}

#flood{
  position:absolute;bottom:0;left:0;right:0;height:0%;
  background:linear-gradient(to top,rgba(4,18,44,0.98) 0%,rgba(14,44,96,0.9) 38%,rgba(24,62,140,0.48) 76%,transparent 100%);
  transition:height 10s ease;pointer-events:none;
}
#flood.sube{height:56%;}
#flood.max{height:92%;}

#sal{
  position:absolute;bottom:0;left:0;right:0;height:0;opacity:0;
  background:linear-gradient(to top,rgba(232,226,214,0.96) 0%,rgba(242,236,226,0.55) 62%,transparent 100%);
  transition:all 5s ease;pointer-events:none;
}
#sal.on{height:33%;opacity:1;}

.ebg{position:absolute;bottom:0;border-radius:2px 2px 0 0;transition:opacity 3.5s,filter 3.5s;}
.ebg.anegado{opacity:0.07;filter:hue-rotate(200deg);}
.ebg.salado{opacity:0.25;filter:saturate(0) brightness(1.55);}
.abg{position:absolute;bottom:0;transition:filter 4s,opacity 4s;}
.abg.muerto{filter:saturate(0) brightness(1.4);opacity:0.4;}

#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 32%,rgba(4,10,20,0.6) 100%);pointer-events:none;}
#dkover{position:absolute;inset:0;background:rgba(4,10,20,0.18);pointer-events:none;}

/* ═══ LAYOUT ═══ */
#wrap{position:relative;z-index:10;display:flex;height:100vh;width:100%;}

/* ═══ LADO PABLO ═══ */
#zpablo{
  flex:0 0 44%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

#pablo-img{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  height:95vh;
  width:auto;
  max-width:95%;
  object-fit:contain;
  object-position:center bottom;
  z-index:10;
  filter:drop-shadow(-6px 0 25px rgba(0,0,0,0.8)) drop-shadow(6px 0 25px rgba(0,0,0,0.5));
  animation:respira 5.5s ease-in-out infinite;
  transition:filter 0.5s;
}
@keyframes respira{
  0%,100%{transform:translateX(-50%) scaleY(1) translateY(0);}
  48%{transform:translateX(-50%) scaleY(1.008) translateY(-3px);}
}
#pablo-img.thinking{
  animation:piensa 1s ease-in-out infinite;
  filter:drop-shadow(-6px 0 25px rgba(0,0,0,0.8)) brightness(0.82) saturate(0.7);
}
@keyframes piensa{
  0%,100%{transform:translateX(-50%) rotate(0deg);}
  50%{transform:translateX(-50%) rotate(-0.5deg) translateY(-2px);}
}
#pablo-img.speaking{
  animation:habla 0.55s ease-in-out infinite;
  filter:drop-shadow(-6px 0 35px rgba(0,0,0,0.85)) drop-shadow(0 0 28px rgba(80,150,220,0.4)) brightness(1.05);
}
@keyframes habla{
  0%,100%{transform:translateX(-50%) scaleY(1) translateY(0);}
  50%{transform:translateX(-50%) scaleY(1.011) translateY(-5px);}
}

/* Sombra en el suelo */
#psombra{
  position:absolute;bottom:0px;left:50%;transform:translateX(-50%);
  width:60%;height:14px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.55) 0%,transparent 70%);
  pointer-events:none;z-index:3;
}

#epoca-badge{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:8.5px;letter-spacing:0.24em;text-transform:uppercase;
  color:rgba(196,163,90,0.85);
  background:rgba(4,10,20,0.75);
  border:1px solid rgba(196,163,90,0.22);
  padding:5px 14px;white-space:nowrap;
  backdrop-filter:blur(10px);
  transition:all 1.4s;z-index:5;
}

#nameplate{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  padding:40px 16px 14px;
  background:linear-gradient(to top,rgba(4,10,20,0.95) 0%,transparent 100%);
  text-align:center;pointer-events:none;
}
#nameplate h2{
  font-family:"Cormorant Garamond",serif;
  font-size:20px;font-style:italic;font-weight:300;color:#f0e8d8;line-height:1.1;
}
#nameplate p{
  font-size:8px;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(196,163,90,0.48);margin-top:4px;
}

/* ═══ CHAT ═══ */
#zchat{
  flex:1;display:flex;flex-direction:column;
  background:rgba(3,8,18,0.82);
  border-left:1px solid rgba(196,163,90,0.1);
  backdrop-filter:blur(16px);
  overflow:hidden;
}

#chat-hdr{
  padding:13px 17px 11px;
  border-bottom:1px solid rgba(196,163,90,0.08);
  flex-shrink:0;
}
#chat-hdr h3{
  font-family:"Cormorant Garamond",serif;
  font-size:15px;font-style:italic;color:#f0e8d8;
}
#chat-hdr p{
  font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(196,163,90,0.35);margin-top:2px;
}

#msgs{
  flex:1;overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:2px;}
#msgs::-webkit-scrollbar-thumb{background:rgba(196,163,90,0.18);}

.msg{display:flex;gap:7px;max-width:94%;animation:mi 0.28s ease forwards;}
@keyframes mi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.pablo{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}

.bub{padding:9px 13px;border-radius:14px;word-break:break-word;}
.pablo .bub{
  background:rgba(8,30,64,0.9);border:1px solid rgba(60,110,165,0.28);
  border-bottom-left-radius:3px;color:#f0e8d8;
  font-family:"Cormorant Garamond",serif;
  font-size:15px;font-style:italic;line-height:1.65;
  backdrop-filter:blur(4px);
}
.user .bub{
  background:rgba(196,163,90,0.11);border:1px solid rgba(196,163,90,0.26);
  border-bottom-right-radius:3px;color:#f0e8d8;font-size:13px;line-height:1.6;
}

#typ{display:none;align-self:flex-start;}
#typ.on{display:flex;gap:7px;animation:mi 0.28s ease forwards;}
.tbub{
  background:rgba(8,30,64,0.88);border:1px solid rgba(60,110,165,0.24);
  padding:10px 14px;border-radius:14px;border-bottom-left-radius:3px;
  display:flex;gap:5px;align-items:center;
}
.d{width:6px;height:6px;border-radius:50%;background:rgba(196,163,90,0.6);animation:bn 1.1s ease-in-out infinite;}
.d:nth-child(2){animation-delay:.16s;}.d:nth-child(3){animation-delay:.32s;}
@keyframes bn{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

#sugs{display:flex;flex-wrap:wrap;gap:6px;padding:0 2px 2px;align-self:flex-start;}
.sg{
  font-size:11.5px;background:rgba(8,30,64,0.65);
  border:1px solid rgba(60,110,165,0.3);color:rgba(190,215,240,0.8);
  padding:6px 12px;border-radius:18px;cursor:pointer;transition:all 0.2s;
  font-family:"Raleway",sans-serif;backdrop-filter:blur(4px);
}
.sg:hover{background:rgba(60,110,165,0.22);border-color:rgba(90,150,210,0.6);color:#f0e8d8;}

#inp-row{
  flex-shrink:0;padding:10px 13px 11px;
  border-top:1px solid rgba(196,163,90,0.08);
  display:flex;gap:8px;align-items:center;
}
#inp{
  flex:1;background:rgba(8,30,64,0.5);border:1px solid rgba(60,110,165,0.2);
  border-radius:22px;padding:9px 16px;color:#f0e8d8;
  font-family:"Raleway",sans-serif;font-size:13px;font-weight:300;
  outline:none;resize:none;max-height:74px;min-height:38px;transition:border-color 0.2s;
}
#inp::placeholder{color:rgba(190,215,240,0.25);}
#inp:focus{border-color:rgba(90,150,210,0.5);}
#sbtn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#1a4a7e,#2a6ab0);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all 0.22s;box-shadow:0 2px 12px rgba(20,70,130,0.45);
}
#sbtn:hover{transform:scale(1.07);box-shadow:0 4px 18px rgba(20,70,130,0.65);}
#sbtn svg{width:16px;height:16px;fill:none;stroke:#f0e8d8;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

#foot{text-align:center;font-size:7.5px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(196,163,90,0.16);padding:0 0 8px;flex-shrink:0;}

@media(max-width:580px){
  #wrap{flex-direction:column;}
  #zpablo{flex:0 0 45%;min-height:210px;}
  #pablo-img{height:100%;bottom:0;}
  #zchat{flex:1;border-left:none;border-top:1px solid rgba(196,163,90,0.08);}
}
</style>
</head>

  <div id="sky">
    <div class="nube" id="n1"></div>
    <div class="nube" id="n2"></div>
    <div class="nube" id="n3"></div>
  </div>
  <div id="terrain"></div>
  <div id="lago"></div>

</div>

<script>
const SP=`Sos Pablo Novak, el último habitante de Villa Epecuén. Naciste en 1931, moriste en enero de 2024 a los 93 años. Hablás como viejo pueblerino bonaerense: usás "mirá", "che", "qué sé yo", "pa\' qué le cuento", "no le miento", "mire usted". Hacés pausas con "...". Sos calmo, filosófico, con humor seco. Mencionás el mate, el viento, la sal, tu ranchito, tu bicicleta.

DATOS:
Antes (1921-1984): 1.500 habitantes, 25.000 turistas por verano. 16 hoteles, 5.000 plazas, 250 comercios. Alfajorlandia, Matadero Salamone 1938, Capilla Santa Teresita, Balneario Municipal, pista de carreras. Lago con salinidad 9x mayor que el océano. Venían Sandro, Mirtha, Sandrini. Tu familia construyó el 70% de los cimientos pero nunca vivió ahí, alquilaban el Hotel San Martín. El arquitecto de la iglesia le dijo a tu padre: "Acá en 1918 se inundó todo. Los ciclos se cumplen."
Durante (1985-2009): terraplén cedió 10 nov 1985 a las 2am. 1.500 evacuados, cero muertos. Canal Ameghino inconcluso desde 1976 por el golpe militar. En 1993 el agua llegó a 10 metros. Los féretros del cementerio flotaron. Las indemnizaciones en australes las devoró la hiperinflación.
Después (2009-2024): volviste solo. Árboles blancos y tiesos por la sal. Salamone único en pie. Flamencos rosados, 3ra colonia de América. Luisito Comunica 22M views. Danny MacAskill 2014. Indio Solari 2021. 10 hijos, 25 nietos, 9 bisnietos. Embajador Cultural de Adolfo Alsina desde 2020.

REGLAS: Primera persona siempre. MÁXIMO 3 oraciones. Una idea por vez. Datos integrados en el habla natural, nunca en lista. Sin asteriscos ni markdown. Usá "..." para pausas. Si no sabés: "Eso no le sé. Yo soy albañil." Fuera de Epecuén: "De eso no sé. Del pueblo, sí."`;

let hist=[],ep='antes',n=0;
const KW={
  antes:['hotel','verano','turistas','antes','1921','1979','balneario','sandro','mirtha','tren','pueblo','era','alfajor','salamone','capilla','aguas','lago'],
  durante:['inundación','terraplén','agua','cedió','1985','noviembre','evacuación','canal','ameghino','féretros','crecida','subió'],
  despues:['ruinas','hoy','ahora','sal','árboles','petrificados','flamencos','volviste','solo','ranchito','2009','luisito','macaskill','indio','después']
};
function detEp(t){
  const s={antes:0,durante:0,despues:0},tl=t.toLowerCase();
  for(const[e,ks]of Object.entries(KW))ks.forEach(k=>{if(tl.includes(k))s[e]++;});
  const mx=Math.max(...Object.values(s));
  return mx?Object.entries(s).find(([,v])=>v===mx)?.[0]:null;
}
function setEp(e){
  if(e===ep)return; ep=e;
  const sk=document.getElementById('sky'),tr=document.getElementById('terrain'),
        lg=document.getElementById('lago'),fl=document.getElementById('flood'),
        sl=document.getElementById('sal'),pi=document.getElementById('epoca-badge'),
        ol=document.getElementById('olas');
  sk.className=e;tr.className=e;lg.className=e;
  if(e==='durante'){
    fl.className='sube';sl.className='';
    pi.textContent='Durante · 1985–2009';
    pi.style.color='rgba(80,155,220,0.9)';pi.style.borderColor='rgba(80,155,220,0.28)';
    ol.style.bottom='68%';
    document.querySelectorAll('.ebg').forEach(b=>b.classList.add('anegado'));
    document.querySelectorAll('.abg').forEach(a=>a.classList.add('muerto'));
    setTimeout(()=>{fl.className='max';},5500);
  } else if(e==='despues'){
    fl.className='';fl.style.height='0';sl.className='on';
    pi.textContent='Después · 2009–2024';
    pi.style.color='rgba(170,158,140,0.8)';pi.style.borderColor='rgba(170,158,140,0.2)';
    ol.style.bottom='42%';
    document.querySelectorAll('.ebg').forEach(b=>{b.classList.remove('anegado');b.classList.add('salado');});
    document.querySelectorAll('.abg').forEach(a=>a.classList.add('muerto'));
  } else {
    fl.className='';fl.style.height='0';sl.className='';
    pi.textContent='Antes · 1979';
    pi.style.color='rgba(196,163,90,0.85)';pi.style.borderColor='rgba(196,163,90,0.22)';
    ol.style.bottom='42%';
    document.querySelectorAll('.ebg').forEach(b=>b.classList.remove('anegado','salado'));
    document.querySelectorAll('.abg').forEach(a=>a.classList.remove('muerto'));
  }
}
function buildBg(){
  const ec=document.getElementById('edificios'),ac=document.getElementById('arboles');
  [{l:40,w:5,h:52,c:'#5a3418'},{l:47,w:6,h:38,c:'#4a2810'},{l:55,w:4.5,h:60,c:'#5a3418'},
   {l:62,w:6,h:35,c:'#3e2008'},{l:70,w:5,h:48,c:'#4a2c10'},{l:78,w:6,h:44,c:'#5a3418'},
   {l:86,w:5,h:56,c:'#4a2c12'},{l:94,w:6,h:38,c:'#3a2008'},{l:102,w:5,h:44,c:'#503010'},
   {l:47,w:4,h:23,c:'#3a200a'},{l:63,w:4,h:21,c:'#4a280c'},{l:79,w:4,h:25,c:'#3e2208'},
   {l:95,w:4,h:19,c:'#502e10'}
  ].forEach(b=>{
    const el=document.createElement('div');el.className='ebg';
    el.style.cssText=`position:absolute;bottom:0;left:${b.l}%;width:${b.w}%;height:${b.h}px;background:linear-gradient(to top,${b.c},#7a5030);border-radius:2px 2px 0 0;`;
    const rw=Math.floor(b.w*4);
    const rf=document.createElement('div');
    rf.style.cssText=`position:absolute;top:0;left:50%;transform:translateX(-50%) translateY(-100%);border-left:${rw/2}px solid transparent;border-right:${rw/2}px solid transparent;border-bottom:9px solid ${b.c};`;
    el.appendChild(rf);ec.appendChild(el);
  });
  [39,46,54,61,68,75,82,89,96,103].forEach(l=>{
    const h=28+Math.random()*22;
    const el=document.createElement('div');el.className='abg';
    el.style.cssText=`position:absolute;bottom:0;left:${l}%;width:10px;`;
    el.innerHTML=`<svg viewBox="0 0 10 ${h}" style="display:block" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="${h*0.62}" width="2" height="${h*0.38}" fill="#5a3810"/>
      <polygon points="5,0 0,${h*0.72} 10,${h*0.72}" fill="#3a7020" opacity="0.88"/>
      <polygon points="5,${h*0.24} 1,${h*0.78} 9,${h*0.78}" fill="#4a8028" opacity="0.7"/>
    </svg>`;
    ac.appendChild(el);
  });
}
function addMsg(txt,who){
  const a=document.getElementById('msgs');
  const sg=document.getElementById('sugs');if(sg)sg.remove();
  const w=document.createElement('div');w.className=`msg ${who}`;
  const b=document.createElement('div');b.className='bub';b.textContent=txt;
  w.appendChild(b);a.appendChild(w);a.scrollTop=a.scrollHeight;n++;
}
function showTyp(){
  const a=document.getElementById('msgs'),t=document.getElementById('typ');
  t.className='on';a.appendChild(t);a.scrollTop=a.scrollHeight;
  document.getElementById('pablo-img').className='thinking';
}
function hideTyp(){
  document.getElementById('typ').className='';
  document.getElementById('pablo-img').className='';
}
function pabloHabla(){
  const img=document.getElementById('pablo-img');
  img.className='speaking';
  setTimeout(()=>{img.className='';},2600);
}
function showSugs(){
  const a=document.getElementById('msgs');
  const ex=document.getElementById('sugs');if(ex)ex.remove();
  const w=document.createElement('div');w.id='sugs';
  ['¿Cómo era el pueblo antes?','¿Por qué te quedaste solo?',
   '¿Qué pasó la noche del 10 de noviembre?','¿Cómo es vivir entre ruinas?',
   '¿Qué es lo que más extrañás?','¿Cómo fue hacerte famoso?'
  ].forEach(q=>{
    const b=document.createElement('button');b.className='sg';b.textContent=q;
    b.onclick=()=>send(q);w.appendChild(b);
  });
  a.appendChild(w);a.scrollTop=a.scrollHeight;
}
async function callAI(msg){
  hist.push({role:'user',content:msg});

  const r = await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:SP,messages:hist})
  });

  const d = await r.json().catch(() => ({}));

  if(!r.ok){
    throw new Error(d.error || ('Error HTTP ' + r.status));
  }

  const t = d.text || '...';
  hist.push({role:'assistant',content:t});
  return t;
}

async function send(texto){
  const inp=document.getElementById('inp');
  const msg=texto||inp.value.trim();
  if(!msg)return;

  inp.value='';
  inp.style.height='';

  addMsg(msg,'user');
  showTyp();

  const e=detEp(msg);
  if(e)setEp(e);

  const t0=Date.now();

  try{
    const r = await callAI(msg);
    const el = Date.now()-t0;

    if(el<800) await new Promise(rv=>setTimeout(rv,800-el));

    hideTyp();
    addMsg(r,'pablo');
    pabloHabla();

    const e2=detEp(r);
    if(e2&&e2!==ep)setEp(e2);

    if(n%3===0)showSugs();

  }catch(err){
    hideTyp();
    addMsg('Mirá... se me fue la señal. ¿Me repetís lo que preguntaste?','pablo');
  }
}

document.getElementById('sbtn').onclick=()=>send();

document.getElementById('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    send();
  }
});

document.getElementById('inp').addEventListener('input',function(){
  this.style.height='';
  this.style.height=Math.min(this.scrollHeight,74)+'px';
});

async function init(){
  buildBg();
  showTyp();

  await new Promise(r=>setTimeout(r,1500));

  hideTyp();
  addMsg('Buenas... Mirá quién llegó. Soy Pablo Novak, el último habitante de Epecuén. Viví el pueblo lleno de gente, lo vi desaparecer bajo el agua, y volví cuando todos se fueron. Pregunte nomás.','pablo');
  pabloHabla();

  await new Promise(r=>setTimeout(r,300));
  showSugs();
}

window.addEventListener('DOMContentLoaded',init);
</script>
